name: Publish core-sdk

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — skipping tag/version check"
            exit 0
          fi
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/ts/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match packages/ts/package.json version '${PKG_VERSION}'"
            exit 1
          fi
          echo "Publishing @monolythium/core-sdk@${PKG_VERSION}"

      - name: Stage LICENSE into package dir
        run: cp LICENSE packages/ts/LICENSE

      - name: Publish to npm
        working-directory: packages/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
