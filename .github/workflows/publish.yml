name: Publish core-sdk

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.22.1
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./packages/ts/package.json').version")
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match packages/ts/package.json version '${PKG_VERSION}'"
            exit 1
          fi
          echo "Publishing @monolythium/core-sdk@${PKG_VERSION}"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate release
        run: |
          pnpm typecheck
          pnpm test
          pnpm build
          git diff --exit-code -- packages/ts/src/version.ts packages/ts/dist
          pnpm --filter @monolythium/core-sdk pack:smoke

      - name: Stage LICENSE into package dir
        run: cp LICENSE packages/ts/LICENSE

      - name: Publish to npm
        working-directory: packages/ts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public
